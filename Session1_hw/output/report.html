<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Topic report — all granularities</title>
<style>
  html,body { height:100%; margin:0; font-family:system-ui,sans-serif; background:#fafafa; color:#222; }
  h1 { font-size:17px; margin:10px 16px 2px; }
  .sub { margin:0 16px 8px; color:#666; font-size:12px; }
  .tabbar { display:flex; gap:4px; flex-wrap:wrap; padding:6px 12px; background:#eef; }
  button { border:1px solid #ccd; background:#fff; padding:6px 14px; border-radius:6px; cursor:pointer; font-size:13px; }
  button.active { background:#4458d6; color:#fff; border-color:#4458d6; }
  .panel { display:none; }
  .frame { width:100%; height:88vh; border:1px solid #e2e2ee; background:#fff; }
</style></head><body>
<h1>Topic report — all granularities</h1>
<div class="sub">Each granularity tab is its full per-mts report. "Secondary topic" = 2nd-best topic has p2 &gt; 0.1.</div>
<div class="tabbar"><button class="tab" id="tab-summary" onclick="show('summary')">Summary</button><button class="tab" id="tab-mts3" onclick="show('mts3')">mts_3</button><button class="tab" id="tab-mts5" onclick="show('mts5')">mts_5</button><button class="tab" id="tab-mts8" onclick="show('mts8')">mts_8</button><button class="tab" id="tab-mts15" onclick="show('mts15')">mts_15</button></div>
<div class="panel" id="panel-summary"><iframe class="frame" data-src="ambiguity_summary.html" loading="lazy"></iframe></div><div class="panel" id="panel-mts3"><iframe class="frame" data-src="mts_3/report.html" loading="lazy"></iframe></div><div class="panel" id="panel-mts5"><iframe class="frame" data-src="mts_5/report.html" loading="lazy"></iframe></div><div class="panel" id="panel-mts8"><iframe class="frame" data-src="mts_8/report.html" loading="lazy"></iframe></div><div class="panel" id="panel-mts15"><iframe class="frame" data-src="mts_15/report.html" loading="lazy"></iframe></div>
<script>
function show(id){
  document.querySelectorAll('.panel').forEach(function(p){ p.style.display='none'; });
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  var panel = document.getElementById('panel-'+id);
  panel.style.display='block';
  document.getElementById('tab-'+id).classList.add('active');
  var f = panel.querySelector('iframe');
  if (f && !f.src && f.dataset.src) f.src = f.dataset.src;
}
show('summary');
</script>
</body></html>
