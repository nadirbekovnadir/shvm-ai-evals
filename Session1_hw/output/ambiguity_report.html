<script>

function showView(size, view){
  var block = document.getElementById('block-'+size);
  block.querySelectorAll('.view-panel').forEach(function(p){ p.style.display='none'; p.classList.remove('active'); });
  block.querySelectorAll('.view-tab').forEach(function(t){ t.classList.remove('active'); });
